name: Daily Botpress Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs at 00:00 (midnight) every day
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # ── timeout-minutes ────────────────────────────────────────────────────────
    # Hard cap: GitHub cancels the job after this many minutes.
    #
    # Why 20?
    #   - sync_listings() calls /api/listings, which fetches every listing detail
    #     sequentially; cold Render + many listings can exceed ~10 minutes.
    #   - 20 minutes leaves headroom while still bounding runaway jobs.
    #   - Lower this only if you accept occasional cancelled syncs.
    #
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        # sync_botpress.py only needs 'requests', so we install it directly.
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Sync Script
        env:
          BOT_ID: ${{ secrets.BOT_ID }}
          BOTPRESS_TOKEN: ${{ secrets.BOTPRESS_TOKEN }}
          IRRES_API_KEY: ${{ secrets.IRRES_API_KEY }}
        run: cd scripts/botpress-sync && python sync_botpress.py
